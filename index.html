<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wise Properties — Real Estate Agents in Mohali &amp; Zirakpur</title>
<meta name="description" content="Your trusted one-stop real estate solution in Mohali and Zirakpur. Buy, sell, or rent residential and commercial properties with honest expert guidance." />
<meta property="og:title" content="Wise Properties" />
<meta property="og:description" content="Your trusted one-stop real estate solution in Mohali and Zirakpur. Buy, sell, or rent residential and commercial properties with honest expert guidance." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://wise-properties-blue.vercel.app" />
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600,500,400&f[]=satoshi@900,700,500,400,300&f[]=gambarino@400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f2f2f2;
    --ink:#111111;
    --ink-2:#1e1e1e;
    --mute:#838282;
    --mute-2:#b6b5b5;
    --line: rgba(30,30,30,0.10);
    --echo-1:#bfbfbf;
    --echo-2:#c9c9c9;
    --echo-3:#d1d1d1;
    --echo-4:#d9d9d9;
    --paper:#ffffff;
    --dark:#1e1e1e;
    --soft:#f6f6f6;
    --accent:#c89a3c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:'Satoshi',ui-sans-serif,system-ui,sans-serif;font-weight:500;font-size:16px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .clash{font-family:'Clash Display','Satoshi',sans-serif;font-weight:700;letter-spacing:-0.05em;line-height:0.9}
  .serif-it{font-family:'Gambarino',Georgia,serif;font-style:italic;letter-spacing:-0.02em;font-weight:400}
  .mono-num{font-variant-numeric:tabular-nums}
  .uc{text-transform:uppercase;letter-spacing:0.08em}
  .hairline{height:1px;background:var(--line)}
  .vhair{width:1px;background:var(--line)}
  .container{max-width:1440px;margin:0 auto;padding:0 48px}
  @media (max-width:720px){ .container{padding:0 24px} }
  ::selection{background:#111;color:#f2f2f2}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfcfcf;border-radius:10px}
  ::-webkit-scrollbar-track{background:transparent}

  .scrim{position:fixed;inset:0;background:rgba(17,17,17,0.55);backdrop-filter:blur(8px);z-index:60;opacity:0;pointer-events:none;transition:opacity 300ms ease}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;top:0;right:0;bottom:0;width:min(900px,96vw);background:var(--bg);z-index:70;transform:translateX(100%);transition:transform 700ms cubic-bezier(0.77,0,0.175,1);overflow:auto}
  .sheet.open{transform:translateX(0)}

  .reveal{clip-path:inset(100% 0 0 0);transition:clip-path 900ms cubic-bezier(0.77,0,0.175,1)}
  .reveal.in{clip-path:inset(0 0 0 0)}

  .gs{filter:grayscale(0.8) contrast(1.02);transition:filter 700ms cubic-bezier(0.77,0,0.175,1), transform 700ms cubic-bezier(0.77,0,0.175,1)}
  .gs-wrap:hover .gs{filter:grayscale(0) contrast(1);transform:scale(1.05)}

  button{font-family:inherit}

  /* ── Responsive helpers ── */
  .hide-mobile { }
  .show-mobile { display: none !important; }
  @media (max-width:768px) {
    .container { padding: 0 20px; }
    .hide-mobile { display: none !important; }
    .show-mobile { display: flex !important; }
  }

  /* Mobile nav overlay */
  .mobile-nav {
    position: fixed; top: 80px; left: 0; right: 0; bottom: 0;
    background: var(--bg); z-index: 45;
    display: flex; flex-direction: column;
    padding: 40px 24px 60px; gap: 0; overflow-y: auto;
    transform: translateY(-110%);
    transition: transform 450ms cubic-bezier(0.77,0,0.175,1);
  }
  .mobile-nav.open { transform: translateY(0); }

  /* Showcase grid on mobile */
  @media (max-width:768px) {
    .showcase-grid {
      grid-template-columns: 1fr 1fr !important;
      grid-auto-rows: auto !important;
    }
    .showcase-grid > button:nth-child(1) {
      grid-column: 1 / -1 !important; grid-row: auto !important;
      aspect-ratio: 16/9 !important; border-radius: 6px !important;
    }
    .showcase-grid > button:nth-child(2) {
      grid-column: span 1 !important; grid-row: auto !important;
      aspect-ratio: 4/3 !important; border-radius: 6px !important;
    }
    .showcase-grid > button:nth-child(3) {
      grid-column: span 1 !important; grid-row: auto !important;
      aspect-ratio: 4/3 !important; border-radius: 6px !important;
    }
    .showcase-grid > button:nth-child(4) {
      grid-column: 1 / -1 !important; grid-row: auto !important;
      aspect-ratio: 16/9 !important; border-radius: 6px !important;
    }
  }

  /* Tabs scrollable */
  .tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  @media (max-width:600px) { .tab-bar { gap: 20px !important; } }

  /* Spec strip 2-col on small */
  @media (max-width:600px) {
    .spec-strip { grid-template-columns: 1fr 1fr !important; }
    .spec-strip > div:nth-child(2n) { border-right: none !important; }
    .spec-strip > div:nth-child(3),
    .spec-strip > div:nth-child(4) { border-top: 1px solid var(--line); }
  }

  /* Compliance 1-col on mobile */
  @media (max-width:600px) { .compliance-grid { grid-template-columns: 1fr !important; } }

  /* Viewing form 1-col */
  @media (max-width:600px) {
    .viewing-form { grid-template-columns: 1fr !important; }
    .viewing-form label { grid-column: auto !important; }
  }

  /* Spec table rows stack on very small */
  @media (max-width:480px) {
    .spec-row { grid-template-columns: 1fr !important; }
    .spec-row > div:first-child { margin-bottom: 2px; }
  }

  /* Sheet padding on mobile */
  @media (max-width:600px) {
    .sheet-sticky { padding: 16px 20px !important; }
    .sheet-body { padding: 28px 20px 60px !important; }
    .sheet-title { font-size: clamp(32px,10vw,56px) !important; }
    .sheet-price { font-size: 32px !important; }
  }

  /* Listing row on very small screens — hide thumbnail */
  @media (max-width:480px) {
    .listing-thumb { display: none !important; }
    .listing-row { grid-template-columns: 36px minmax(0,1fr) auto 36px !important; gap: 10px !important; }
  }

  /* Hero responsive */
  @media (max-width:600px) {
    .hero-top { flex-direction: column !important; gap: 28px !important; }
    .hero-stats { gap: 20px !important; }
    .hero-bottom { flex-direction: column !important; align-items: flex-start !important; }
  }

  /* WhatsApp FAB on mobile */
  @media (max-width:480px) {
    .wa-fab { right: 16px !important; bottom: 16px !important; }
  }

  /* Filter rail wrap fix */
  @media (max-width:600px) {
    .filter-rail { flex-direction: column !important; align-items: flex-start !important; }
  }

  /* About section */
  @media (max-width:768px) {
    .about-photo-col { max-width: 100% !important; justify-self: stretch !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="properties.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
